<!DOCTYPE html>
<html>

    <style>
        body {

            box-shadow: 0px 0px 10px rgba(255,255,255,0.1);
        }

        h2 {
            margin-top: 0;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: #1f1f1f;
            font-size: 14px;
        }

    🎌 AnimeVerdict

<div class="container">

        <h2>Demon Slayer Review</h2>
        <p>Story: 8/10</p>

<footer>
